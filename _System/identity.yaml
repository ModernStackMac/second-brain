      keychain_service: LINEAR_HIGHMEADOW_API_KEY

  jira:
    - id: f2
      name: F2 Strategy
      prefix: F2
      cloud: f2strategy
      email: mac.nosek@f2strategy.com
      auth: mcp

  confluence:
    - id: f2-internal
      cloud: f2strategy
      email: mac.nosek@f2strategy.com
      auth: mcp
      destination: Second Brain/wiki/f2-internal/

filters:
  story_sync:
    # STRICT active set (narrowed 2026-04-18). Drop In Review, QA, Blocked, etc.
    # story-sync.js active_statuses constant must match this list.
    active_statuses:
      # Linear
      - Todo
      - Started
      - In Progress
      # Jira
      - To Do
      - In Progress

    # Backlog set: only if in current cycle. Dropped 14-day updated fallback.
    backlog_conditions:
      in_current_cycle: true

    # Identity match: at least one must be true.
    identity_match_any_of:
      - assignee_email_in_list
      - assignee_name_in_aliases

  decision_log:
    trigger_patterns:
      - "decision:"
      - "decided:"
      - "Decisions"
      - "Key decisions"
    owner_default: Mac Nosek
    dedupe_hash_fields: [date, project, decision_first_80]

  commitments:
    file: commitments.md
    extraction_gates:
      - owner_is_mac                    # explicit commitment from Mac or assignment to Mac
      - firm_commitment_verb            # "I'll", "Mac will", "action for Mac"
      - concrete_next_step              # actionable, not a topic area
      - deduplicate_open_items          # compare first 60 chars + project
    archive_after_days_done: 14

project_slug_map:
  meadow:                internal/meadow
  capacity-planning:     internal/meadow
  capacity-planning-mss: internal/meadow
  flex-dash:             internal/flex-dash
  flexdash:              internal/flex-dash
  high-meadow-website:   internal/high-meadow-website
  highmeadow-website:    internal/high-meadow-website
  hm-website:            internal/high-meadow-website
  mai-crm-build:         mai
  mai:                   mai
  cetera:                f2-cetera
  f2-cetera:             f2-cetera
  lnw:                   lnw

paths:
  vault_root: "~/Documents/Obsidian Vault"
  meeting_notes_root: Meeting Notes
  raw_articles: Second Brain/raw/articles/
  raw_projects: Second Brain/raw/projects/
  raw_transcripts: Second Brain/raw/transcripts/
  wiki: Second Brain/wiki/
  commitments_file: commitments.md
  decision_log: Second Brain/Decision-Log.md
  diagrams: Second Brain/resources/diagrams/

