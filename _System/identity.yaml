      - mac@highmeadowsolutions.com

workspaces:
  linear:
    - id: mss
      name: Modern Stack Systems
      prefix: MSS
      email: mac.nosek@modernstacksystems.com
      auth: mcp
    - id: hm
      name: High Meadow
      prefix: HM
      email: mac@highmeadowsolutions.com
